$lock_cmd = caelestia shell lock lock

general {
    lock_cmd = $lock_cmd
    before_sleep_cmd = $lock_cmd
    after_sleep_cmd = hyprctl dispatch dpms on
    inhibit_sleep = 3
}

listener {
    timeout = 900 # 15mins
    on-timeout = $lock_cmd
}

listener {
    timeout = 1800 # 30mins
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}
